name: Build Template

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Имя Docker-образа (без юзернейма, например: my-app)'
        required: true
        type: string
    # Явно объявляем ожидаемые секреты
    secrets:
      DOCKER_USER:
        required: true
      DOCKER_PASS:
        required: true

jobs:
  build_image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push image
        env:
          IMAGE_BASE: ${{ secrets.DOCKER_USER }}/${{ inputs.image_name }}
        run: |
          docker build -t $IMAGE_BASE:sha-${{ github.sha }} -t $IMAGE_BASE:latest .
          docker push $IMAGE_BASE:sha-${{ github.sha }}
          docker push $IMAGE_BASE:latest