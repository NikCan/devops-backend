name: Deploy

on:
  push:
    branches: [main]

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml

  build:
    name: Build
    needs: [checks]
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build-push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build и push образа с двумя тегами
        id: build-push
        env:
          IMAGE_TAG: sha-${{ github.sha }}
          IMAGE_SHA: ${{ secrets.DOCKER_USER }}/devops-backend:sha-${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.DOCKER_USER }}/devops-backend:latest
        run: |
          docker build -t $IMAGE_SHA -t $IMAGE_LATEST .
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy
    needs: [checks, build]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          BACKEND_IMAGE: ${{ secrets.DOCKER_USER }}/devops-backend:${{ needs.build.outputs.image_tag }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: BACKEND_IMAGE
          script: |
            cd /var/www/lesson

            sed -i "s|BACKEND_IMAGE=.*|BACKEND_IMAGE=${BACKEND_IMAGE}|" .env

            docker compose up -d --no-deps backend

  notify:
    name: Notify
    needs: [checks, build, deploy]
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      checks_result: ${{ needs.checks.result }}
      build_result: ${{ needs.build.result }}
      deploy_result: ${{ needs.deploy.result }}
    secrets: inherit
